version: '3.8'

services:
  app:
    build: .
    container_name: todocamisetas_app
    ports:
      - "8082:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: todocamisetas_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: todocamisetas
    ports:
      - "3310:3306"
